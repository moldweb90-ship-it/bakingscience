name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          insecure: true
          script: |
            cd /var/www/bakingscience
            git pull origin main
            npm ci
            npm run build
            pm2 restart bakingscience
            echo "✅ Deployed successfully!"
